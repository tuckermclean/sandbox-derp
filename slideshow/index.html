<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src https://upload.wikimedia.org; script-src 'unsafe-inline'; style-src 'unsafe-inline'; font-src 'none'; connect-src 'none'; frame-ancestors 'none';">
  <title>Bosnia &amp; Herzegovina — FIFA World Cup 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 0.75rem 1rem 0.5rem;
      flex-shrink: 0;
    }

    header h1 {
      font-size: clamp(1.1rem, 3vw, 1.7rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    header p {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: #b0c4de;
      margin-top: 0.25rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stage {
      position: relative;
      flex: 1;
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease-in-out;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      max-width: 100%;
      max-height: calc(100vh - 200px);
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .slide .fallback {
      display: none;
      width: min(640px, 90vw);
      height: min(380px, 50vh);
      background: linear-gradient(135deg, #1a2a4a 0%, #0d1f3c 100%);
      border: 2px solid #2a4a7a;
      border-radius: 6px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1.5rem;
      text-align: center;
    }

    .slide .fallback .flag {
      font-size: 3rem;
      margin-bottom: 0.25rem;
    }

    .slide .fallback .fallback-title {
      font-size: 1rem;
      color: #ffd700;
      font-weight: 600;
    }

    .slide .fallback .fallback-sub {
      font-size: 0.8rem;
      color: #7090b0;
    }

    .caption {
      position: relative;
      max-width: min(700px, 90vw);
      text-align: center;
      padding: 0.5rem 1rem;
      font-size: clamp(0.8rem, 2.2vw, 1rem);
      color: #cde;
      line-height: 1.5;
      flex-shrink: 0;
    }

    .caption strong {
      display: block;
      color: #ffd700;
      font-size: 1.05em;
      margin-bottom: 0.2rem;
    }

    /* Prev / Next buttons */
    .btn-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
      user-select: none;
    }

    .btn-nav:hover { background: rgba(255,215,0,0.18); border-color: #ffd700; }
    .btn-nav.prev { left: 0.5rem; }
    .btn-nav.next { right: 0.5rem; }

    footer {
      flex-shrink: 0;
      padding: 0.5rem 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .dots {
      display: flex;
      gap: 0.4rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
      border: none;
      padding: 0;
    }

    .dot.active {
      background: #ffd700;
      transform: scale(1.3);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-playpause {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.8rem;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-playpause:hover {
      background: rgba(255,215,0,0.15);
      border-color: #ffd700;
      color: #ffd700;
    }

    .slide-counter {
      font-size: 0.78rem;
      color: #5a7a9a;
      letter-spacing: 0.06em;
    }

    .source-note {
      font-size: 0.65rem;
      color: #3a5a7a;
      margin-top: 0.2rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>🇧🇦 Bosnia &amp; Herzegovina</h1>
  <p>FIFA World Cup 2026</p>
</header>

<div class="stage" id="stage">
  <button class="btn-nav prev" id="btnPrev" aria-label="Previous slide">&#8249;</button>
  <button class="btn-nav next" id="btnNext" aria-label="Next slide">&#8250;</button>
  <!-- slides injected by JS -->
</div>

<footer>
  <div class="dots" id="dots"></div>
  <div class="controls">
    <button class="btn-playpause" id="btnPlay">⏸ Pause</button>
    <span class="slide-counter" id="counter" aria-live="polite" aria-atomic="true">1 / 1</span>
  </div>
  <p class="source-note">
    Images sourced from Wikimedia Commons, each under individual Creative Commons license (CC-BY/CC-BY-SA).
    Google Images was not used — hotlinking its results is unreliable and unlicensable.
  </p>
</footer>

<script>
  // Frame-busting guard: frame-ancestors in <meta> CSP is ignored by browsers
  // (W3C CSP Level 3 spec). This JS guard provides the actual clickjacking defence.
  if (window !== window.top) {
    document.body.innerHTML = '';
    window.top.location = window.location.href;
  }

  // ---------------------------------------------------------------------------
  // Slide data. Images from Wikimedia Commons for stability and licensing.
  // Captions tie each photo to Bosnia & Herzegovina at the 2026 World Cup.
  // ---------------------------------------------------------------------------
  const SLIDES = [
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Football_pictogram.svg/512px-Football_pictogram.svg.png",
      title: "Bosnia & Herzegovina qualify for FIFA World Cup 2026",
      caption: "For only the second time in their history, the Zmajevi (Dragons) reached the World Cup finals — North America 2026 awaits.",
      fallbackTitle: "FIFA World Cup 2026",
      fallbackSub: "Bosnia & Herzegovina make history again"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Bosnia_and_Herzegovina_national_football_team_2014.jpg/960px-Bosnia_and_Herzegovina_national_football_team_2014.jpg",
      title: "The Zmajevi squad",
      caption: "The national side brought pride to their nation at Brazil 2014 and return to the biggest stage in North America 2026.",
      fallbackTitle: "Bosnia National Team",
      fallbackSub: "The Dragons of the Balkans"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Bosnia_and_Herzegovina_v_Argentina_-_2014_FIFA_World_Cup_-_Group_F_%28282%29.jpg/1280px-Bosnia_and_Herzegovina_v_Argentina_-_2014_FIFA_World_Cup_-_Group_F_%28282%29.jpg",
      title: "Bosnia vs Argentina — 2014 FIFA World Cup",
      caption: "A hard-fought battle against Argentina in Brazil. 2026 brings another crack at a run deeper into the tournament.",
      fallbackTitle: "Bosnia vs Argentina 2014",
      fallbackSub: "Group F — FIFA World Cup Brazil"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Edin_D%C5%BEeko_%282019%29.jpg/800px-Edin_D%C5%BEeko_%282019%29.jpg",
      title: "Edin Džeko — Bosnia's all-time top scorer",
      caption: "A veteran of international football with over 65 goals for Bosnia. His experience and proven goal-scoring will be critical for Bosnia's 2026 World Cup campaign.",
      fallbackTitle: "Edin Džeko",
      fallbackSub: "Bosnia's all-time leading goal scorer"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Miralem_Pjani%C4%87_%282017%29.jpg/800px-Miralem_Pjani%C4%87_%282017%29.jpg",
      title: "Miralem Pjanić — midfield maestro",
      caption: "An elegant playmaker with top-flight European experience at Juventus and Barcelona. Bosnia will depend on his midfield quality at the 2026 World Cup.",
      fallbackTitle: "Miralem Pjanić",
      fallbackSub: "Bosnia's midfield maestro"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/2026_FIFA_World_Cup_logo.svg/800px-2026_FIFA_World_Cup_logo.svg.png",
      title: "FIFA World Cup 2026 — USA · Canada · Mexico",
      caption: "The expanded 48-team tournament spreads across three nations. Bosnia face their biggest stage since 2014.",
      fallbackTitle: "FIFA World Cup 2026",
      fallbackSub: "USA · Canada · Mexico"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Sead_Kolasinac_2017.jpg/800px-Sead_Kolasinac_2017.jpg",
      title: "Sead Kolašinac — defensive rock",
      caption: "The powerful left-back has anchored Bosnia's defence across Europe. His energy and grit will be vital at 2026.",
      fallbackTitle: "Sead Kolašinac",
      fallbackSub: "Bosnia's defensive powerhouse"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Flag_of_Bosnia_and_Herzegovina.svg/1280px-Flag_of_Bosnia_and_Herzegovina.svg.png",
      title: "Zastava Bosne i Hercegovine",
      caption: "The blue, yellow, and white — worn with pride by millions across the world as the Dragons take on North America 2026.",
      fallbackTitle: "Flag of Bosnia & Herzegovina",
      fallbackSub: "Carried to the World Cup 2026"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Ermedin_Demirovic_2022.jpg/800px-Ermedin_Demirovic_2022.jpg",
      title: "Ermedin Demirović — next-generation striker",
      caption: "The Stuttgart and Borussia Dortmund forward emerged as Bosnia's most dangerous finisher heading into the 2026 campaign.",
      fallbackTitle: "Ermedin Demirović",
      fallbackSub: "Bosnia's strike force for 2026"
    },
    {
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Stadion_Bilino_Polje_aerial.jpg/1280px-Stadion_Bilino_Polje_aerial.jpg",
      title: "Stadion Bilino Polje — Zenica",
      caption: "Bosnia's fortress at home: the passionate crowd at Bilino Polje gave the Zmajevi the energy to secure their 2026 qualification.",
      fallbackTitle: "Stadion Bilino Polje",
      fallbackSub: "Home of the Zmajevi — Zenica, Bosnia"
    }
  ];

  const INTERVAL_MS = 4000;

  const stage = document.getElementById("stage");
  const dotsEl = document.getElementById("dots");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  const btnPlay = document.getElementById("btnPlay");
  const counter = document.getElementById("counter");

  let current = 0;
  let playing = true;
  let timer = null;

  // Build slide elements
  const slideEls = SLIDES.map((s, i) => {
    const div = document.createElement("div");
    div.className = "slide" + (i === 0 ? " active" : "");
    div.setAttribute("role", "group");
    div.setAttribute("aria-label", s.title); // setAttribute handles encoding; escapeHTML not needed here (unlike innerHTML below)

    const img = document.createElement("img");
    if (s.url.startsWith("https://")) img.src = s.url;
    img.alt = s.title;

    // Fallback container shown when image fails to load
    const fb = document.createElement("div");
    fb.className = "fallback";
    fb.innerHTML = `<div class="flag">🇧🇦</div>
      <div class="fallback-title">${escapeHTML(s.fallbackTitle)}</div>
      <div class="fallback-sub">${escapeHTML(s.fallbackSub)}</div>`;

    img.addEventListener("error", () => {
      img.style.display = "none";
      fb.style.display = "flex";
    });

    const cap = document.createElement("div");
    cap.className = "caption";
    cap.innerHTML = `<strong>${escapeHTML(s.title)}</strong>${escapeHTML(s.caption)}`;

    div.appendChild(img);
    div.appendChild(fb);
    div.appendChild(cap);
    stage.insertBefore(div, btnPrev);
    return div;
  });

  // Build dots
  const dotEls = SLIDES.map((_, i) => {
    const btn = document.createElement("button");
    btn.className = "dot" + (i === 0 ? " active" : "");
    btn.setAttribute("aria-label", `Go to slide ${i + 1}`);
    if (i === 0) btn.setAttribute("aria-current", "true");
    btn.addEventListener("click", () => navigate(() => goTo(i)));
    dotsEl.appendChild(btn);
    return btn;
  });

  function escapeHTML(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function goTo(n) {
    slideEls[current].classList.remove("active");
    dotEls[current].classList.remove("active");
    dotEls[current].removeAttribute("aria-current");
    current = (n + SLIDES.length) % SLIDES.length;
    slideEls[current].classList.add("active");
    dotEls[current].classList.add("active");
    dotEls[current].setAttribute("aria-current", "true");
    counter.textContent = `${current + 1} / ${SLIDES.length}`;
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  function startTimer() {
    clearInterval(timer);
    timer = setInterval(next, INTERVAL_MS);
  }

  function pauseTimer() {
    clearInterval(timer);
    timer = null;
  }

  function navigate(fn) {
    if (playing) startTimer();
    fn();
  }

  function togglePlay() {
    playing = !playing;
    if (playing) {
      startTimer();
      btnPlay.textContent = "⏸ Pause";
    } else {
      pauseTimer();
      btnPlay.textContent = "▶ Play";
    }
  }

  btnNext.addEventListener("click", () => navigate(next));
  btnPrev.addEventListener("click", () => navigate(prev));
  btnPlay.addEventListener("click", togglePlay);

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") navigate(next);
    else if (e.key === "ArrowLeft") navigate(prev);
    else if (e.key === " ") { if (e.target.tagName !== 'BUTTON') e.preventDefault(); togglePlay(); }
  });

  // Init
  goTo(0);
  startTimer();
</script>

</body>
</html>
